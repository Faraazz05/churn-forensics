# ══════════════════════════════════════════════════════════════
# Customer Health Forensics — CI/CD Pipeline
# Phase 8: GitHub Actions
#
# Triggers: push to main, PRs to main
# Jobs:
#   1. lint-backend   → ruff + mypy type check
#   2. test-backend   → pytest (if tests exist)
#   3. build-backend  → Docker image build validation
#   4. build-frontend → Vite production build
#   5. deploy-backend → Render webhook (main branch only)
#   6. deploy-frontend→ GitHub Pages (main branch only)
# ══════════════════════════════════════════════════════════════

name: CI/CD — Customer Health Forensics

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "20"
  REGISTRY:       ghcr.io
  IMAGE_NAME:     ${{ github.repository }}/churn-api

jobs:

  # ── 1. Backend lint + type check ────────────────────────────
  lint-backend:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint (src/)
        run: ruff check src/ --ignore E501,F401

      - name: Ruff lint (backend/src/)
        run: ruff check backend/src/ --ignore E501,F401

  # ── 2. Backend tests ────────────────────────────────────────
  test-backend:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests (if tests/ directory exists)
        run: |
          if [ -d "tests/" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests directory found — skipping"
          fi

  # ── 3. Backend Docker build validation ─────────────────────
  build-backend:
    name: Backend — Docker Build
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push on PR)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 4. Frontend build ───────────────────────────────────────
  build-frontend:
    name: Frontend — Vite Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Create .env for build
        working-directory: Frontend
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL || 'http://localhost:3000' }}" > .env
          echo "VITE_API_KEY_READONLY=${{ secrets.VITE_API_KEY_READONLY || 'readonly-key' }}" >> .env
          echo "VITE_API_KEY_ADMIN=${{ secrets.VITE_API_KEY_ADMIN || 'admin-key' }}" >> .env
          echo "VITE_WATCHLIST_THRESHOLD=0.70" >> .env
          echo "VITE_APP_NAME=Customer Health Forensics" >> .env

      - name: Build frontend
        working-directory: Frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist/
          retention-days: 7

  # ── 5. Deploy backend to Render (main only) ─────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [build-backend, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy webhook
        # Add RENDER_DEPLOY_HOOK_URL to GitHub repo secrets
        # Get it from: Render dashboard → service → Settings → Deploy Hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "Render deploy triggered"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping deploy"
            echo "Add it to GitHub secrets to enable automatic Render deployment"
          fi

  # ── 6. Deploy frontend to GitHub Pages (main only) ──────────
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pages:    write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  Frontend/dist
          cname:        ""   # Add your custom domain here if you have one
