# ══════════════════════════════════════════════════════════════
# Nginx config — serves frontend + proxies /api → backend
# Used when deploying frontend + backend on same server
# ══════════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    server {
        listen 80;
        server_name _;

        # Frontend (React build)
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;  # SPA fallback
        }

        # Backend API proxy
        location /api/ {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass         http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # Direct backend access (no prefix rewrite)
        location ~ ^/(health|predict|explain|segments|drift|insights|models|customers|watchlist|report|pipeline|upload|logs|uploads) {
            proxy_pass         http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }
    }
}
